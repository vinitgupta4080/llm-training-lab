&lt;div id=&quot;module00-hub&quot;&gt;
  &lt;div class=&quot;viz-row&quot; style=&quot;justify-content:center;margin-bottom:1rem;&quot;&gt;

  &lt;div class=&quot;viz-grid&quot;&gt;
    &lt;div class=&quot;card viz-stat&quot;&gt;&lt;div class=&quot;text-muted&quot;&gt;Topic&lt;/div&gt;&lt;div id=&quot;hub-topic&quot; class=&quot;viz-stat-value&quot;&gt;Tensor&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;card viz-stat&quot;&gt;&lt;div class=&quot;text-muted&quot;&gt;Core rule&lt;/div&gt;&lt;div id=&quot;hub-rule&quot; class=&quot;viz-stat-value&quot;&gt;rank = axes&lt;/div&gt;&lt;/div&gt;

  &lt;div class=&quot;card&quot; style=&quot;margin-top:.75rem;&quot;&gt;
    &lt;div&gt;&lt;span class=&quot;text-muted&quot;&gt;Why · &lt;/span&gt;&lt;span id=&quot;hub-why&quot;&gt;Organize numerical values for model computation.&lt;/span&gt;&lt;/div&gt;
    &lt;div style=&quot;margin-top:.5rem;&quot;&gt;&lt;span class=&quot;text-muted&quot;&gt;Idea · &lt;/span&gt;&lt;span id=&quot;hub-idea&quot;&gt;A tensor is a numerical container with zero or more axes.&lt;/span&gt;&lt;/div&gt;

&lt;script&gt;
(() =&gt; {
  const root=document.getElementById(&#x27;module00-hub&#x27;),svg=root.querySelector(&#x27;#hub-svg&#x27;),ns=&#x27;http://www.w3.org/2000/svg&#x27;;
  const topics=[
    {name:&#x27;Tensor&#x27;,rule:&#x27;rank = axes&#x27;,why:&#x27;Organize numerical values for model computation.&#x27;,idea:&#x27;A tensor is a numerical container with zero or more axes.&#x27;,technical:&#x27;Rank counts axes; shape gives each axis length; numel is their product.&#x27;,question:&#x27;What is the rank of shape [2,3,4]?&#x27;,answers:[&#x27;2&#x27;,&#x27;3&#x27;,&#x27;24&#x27;],correct:1,labels:[&#x27;scalar []&#x27;,&#x27;vector [C]&#x27;,&#x27;matrix [T,C]&#x27;,&#x27;tensor [B,T,C]&#x27;]},
    {name:&#x27;Memory&#x27;,rule:&#x27;numel × bytes&#x27;,why:&#x27;Predict whether a model or batch fits in device memory.&#x27;,idea:&#x27;Every logical value uses storage determined by its dtype.&#x27;,technical:&#x27;Dense bytes = numel × element_size; shared views may use less unique storage.&#x27;,question:&#x27;How many bytes does [2,3,4] float32 use?&#x27;,answers:[&#x27;24&#x27;,&#x27;48&#x27;,&#x27;96&#x27;],correct:2,labels:[&#x27;24 elements&#x27;,&#x27;× 4 bytes&#x27;,&#x27;96 bytes&#x27;]},
    {name:&#x27;Matmul&#x27;,rule:&#x27;≈ 2N³ FLOPs&#x27;,why:&#x27;Linear layers and attention projections spend most compute in matrix multiplication.&#x27;,idea:&#x27;Every output cell is a row-column dot product.&#x27;,technical:&#x27;[M,K]@[K,N]→[M,N], approximately 2MKN FLOPs; square work scales cubically.&#x27;,question:&#x27;If square N doubles, how does matmul work grow?&#x27;,answers:[&#x27;4×&#x27;,&#x27;8×&#x27;,&#x27;16×&#x27;],correct:1,labels:[&#x27;N&#x27;,&#x27;2N&#x27;,&#x27;work: 8×&#x27;]},
    {name:&#x27;Seeds&#x27;,rule:&#x27;same state → same sequence&#x27;,why:&#x27;Repeat initialization, batches, dropout, and sampling during experiments.&#x27;,idea:&#x27;A seed initializes a deterministic pseudorandom generator state.&#x27;,technical:&#x27;Same generator, seed, and ordered calls reproduce a sequence; a seed alone does not force deterministic kernels.&#x27;,question:&#x27;What must match for replay?&#x27;,answers:[&#x27;seed only&#x27;,&#x27;seed + call order&#x27;,&#x27;tensor shape only&#x27;],correct:1,labels:[&#x27;seed&#x27;,&#x27;generator state&#x27;,&#x27;ordered draws&#x27;]},
    {name:&#x27;Strides&#x27;,rule:&#x27;offset = Σ index×stride&#x27;,why:&#x27;Create cheap views and understand hidden memory-copy costs.&#x27;,idea:&#x27;Shape is the logical layout; strides map logical indices to physical storage.&#x27;,technical:&#x27;Contiguous [B,T,C] uses [T×C,C,1]; transpose permutes shape and stride metadata.&#x27;,question:&#x27;Contiguous stride for shape [2,3,4]?&#x27;,answers:[&#x27;[3,4,1]&#x27;,&#x27;[12,4,1]&#x27;,&#x27;[0,0,1]&#x27;],correct:1,labels:[&#x27;shape [2,3,4]&#x27;,&#x27;stride [12,4,1]&#x27;,&#x27;storage offset&#x27;]},
    {name:&#x27;Broadcast&#x27;,rule:&#x27;match or one is 1&#x27;,why:&#x27;Apply one bias, scale, or mask across many tokens without manual copies.&#x27;,idea:&#x27;A smaller compatible tensor behaves as if logically expanded.&#x27;,technical:&#x27;Align from the right; pairs match or contain 1. Expanded axes may use stride 0.&#x27;,question:&#x27;Can [2,3,4] + [4] broadcast?&#x27;,answers:[&#x27;yes&#x27;,&#x27;no&#x27;,&#x27;only on GPU&#x27;],correct:0,labels:[&#x27;hidden [2,3,4]&#x27;,&#x27;bias [1,1,4]&#x27;,&#x27;output [2,3,4]&#x27;]},
    {name:&#x27;Hidden state&#x27;,rule:&#x27;internal token vectors [B,T,C]&#x27;,why:&#x27;Transform token IDs into contextual numerical representations used for prediction.&#x27;,idea:&#x27;Each layer produces a new internal vector for every token.&#x27;,technical:&#x27;Hidden states commonly keep [B,T,C]; output projection changes C into vocabulary logits V.&#x27;,question:&#x27;What does C count?&#x27;,answers:[&#x27;tokens&#x27;,&#x27;batches&#x27;,&#x27;channels per token&#x27;],correct:2,labels:[&#x27;token IDs [B,T]&#x27;,&#x27;hidden [B,T,C]&#x27;,&#x27;logits [B,T,V]&#x27;]}
  ];
  function add(tag,attrs,label){const n=document.createElementNS(ns,tag);Object.entries(attrs).forEach(([k,v])=&gt;n.setAttribute(k,v));if(label!==undefined)n.textContent=label;svg.appendChild(n);return n;}
  function render(index){
    const topic=topics[index];svg.replaceChildren();root.querySelectorAll(&#x27;[data-topic]&#x27;).forEach(b=&gt;b.setAttribute(&#x27;aria-pressed&#x27;,String(Number(b.dataset.topic)===index)));
    root.querySelector(&#x27;#hub-topic&#x27;).textContent=topic.name;root.querySelector(&#x27;#hub-rule&#x27;).textContent=topic.rule;root.querySelector(&#x27;#hub-why&#x27;).textContent=topic.why;root.querySelector(&#x27;#hub-idea&#x27;).textContent=topic.idea;root.querySelector(&#x27;#hub-technical&#x27;).textContent=topic.technical;root.querySelector(&#x27;#hub-question&#x27;).textContent=topic.question;root.querySelector(&#x27;#hub-feedback&#x27;).textContent=&#x27;Choose an answer.&#x27;;
    topic.labels.forEach((label,i)=&gt;{const x=55+i*(610/(topic.labels.length-1||1));add(&#x27;rect&#x27;,{x:x-50,y:75,width:100,height:58,rx:4,fill:`color-mix(in srgb, var(--viz-series-${(i%3)+1}) 16%, transparent)`,stroke:&#x27;var(--border)&#x27;});add(&#x27;text&#x27;,{x,y:109,&#x27;text-anchor&#x27;:&#x27;middle&#x27;,fill:&#x27;currentColor&#x27;},label);if(i&lt;topic.labels.length-1){const nx=55+(i+1)*(610/(topic.labels.length-1));add(&#x27;path&#x27;,{d:`M${x+50} 104 H${nx-50} M${nx-58} 97 L${nx-50} 104 L${nx-58} 111`,fill:&#x27;none&#x27;,stroke:&#x27;var(--border)&#x27;,&#x27;stroke-width&#x27;:2});}});
    add(&#x27;text&#x27;,{x:360,y:190,&#x27;text-anchor&#x27;:&#x27;middle&#x27;,fill:&#x27;var(--muted-foreground)&#x27;},topic.rule);
    const answers=root.querySelector(&#x27;#hub-answers&#x27;);answers.replaceChildren();topic.answers.forEach((answer,i)=&gt;{const button=document.createElement(&#x27;button&#x27;);button.className=&#x27;btn btn-secondary&#x27;;button.type=&#x27;button&#x27;;button.textContent=answer;button.addEventListener(&#x27;click&#x27;,()=&gt;{root.querySelector(&#x27;#hub-feedback&#x27;).textContent=i===topic.correct?&#x27;Correct.&#x27;:&#x27;Try again.&#x27;;});answers.appendChild(button);});
  }
  root.querySelectorAll(&#x27;[data-topic]&#x27;).forEach(b=&gt;b.addEventListener(&#x27;click&#x27;,()=&gt;render(Number(b.dataset.topic))));render(0);
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
