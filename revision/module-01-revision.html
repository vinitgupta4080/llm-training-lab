.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {

html&gt;body{padding:0}&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div id=&quot;module01-checkpoint&quot;&gt;
  &lt;div class=&quot;viz-controls&quot; aria-label=&quot;Module 1 revision topic&quot;&gt;
    &lt;button class=&quot;btn&quot; data-topic=&quot;0&quot; aria-pressed=&quot;true&quot;&gt;Bytes&lt;/button&gt;
    &lt;button class=&quot;btn&quot; data-topic=&quot;1&quot; aria-pressed=&quot;false&quot;&gt;Train BPE&lt;/button&gt;
    &lt;button class=&quot;btn&quot; data-topic=&quot;2&quot; aria-pressed=&quot;false&quot;&gt;Encode&lt;/button&gt;
    &lt;button class=&quot;btn&quot; data-topic=&quot;3&quot; aria-pressed=&quot;false&quot;&gt;Decode&lt;/button&gt;
    &lt;button class=&quot;btn&quot; data-topic=&quot;4&quot; aria-pressed=&quot;false&quot;&gt;Coverage&lt;/button&gt;
    &lt;button class=&quot;btn&quot; data-topic=&quot;5&quot; aria-pressed=&quot;false&quot;&gt;Cost&lt;/button&gt;
  &lt;/div&gt;
  &lt;div class=&quot;card&quot; aria-live=&quot;polite&quot;&gt;
    &lt;div class=&quot;text-small&quot; id=&quot;m1c-name&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;m1c-rule&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;viz-row&quot; id=&quot;m1c-flow&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;text-small&quot; id=&quot;m1c-detail&quot;&gt;&lt;/div&gt;
  &lt;/div&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div id=&quot;m1c-question&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;viz-row&quot; id=&quot;m1c-answers&quot;&gt;&lt;/div&gt;
    &lt;div class=&quot;text-small&quot; id=&quot;m1c-feedback&quot;&gt;Choose an answer.&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;
&lt;style&gt;
  #module01-checkpoint { display:grid; gap:var(--space-3); }
  #module01-checkpoint .card { display:grid; gap:var(--space-3); }
  #m1c-flow { justify-content:flex-start; }
  #m1c-flow span { padding:var(--space-2) var(--space-3); border-radius:var(--radius); background:color-mix(in srgb, var(--viz-series-1) 16%, transparent); }
  #m1c-detail, #m1c-feedback { color:var(--muted-foreground); }
&lt;/style&gt;
&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;module01-checkpoint&#x27;);
  const topics = [
    {name:&#x27;UTF-8 byte foundation&#x27;, rule:&#x27;Every valid text becomes byte IDs 0–255.&#x27;, flow:[&#x27;text&#x27;,&#x27;UTF-8&#x27;,&#x27;bytes&#x27;,&#x27;base IDs&#x27;], detail:&#x27;One visible symbol may require multiple bytes. PAD/BOS/EOS use 256–258; learned merges begin at 259.&#x27;, question:&#x27;Why can byte BPE represent an unseen emoji?&#x27;, answers:[&#x27;All possible bytes already have IDs&#x27;,&#x27;Encoding learns a new emoji rule&#x27;], correct:0},
    {name:&#x27;BPE training&#x27;, rule:&#x27;Count → choose → assign → merge → recount.&#x27;, flow:[&#x27;count pairs&#x27;,&#x27;choose frequent&#x27;,&#x27;new ID&#x27;,&#x27;replace&#x27;,&#x27;repeat&#x27;], detail:&#x27;Merges are ordered, non-overlapping, deterministic under the tie-break, and learned only from the training corpus.&#x27;, question:&#x27;Does a requested budget of 40 guarantee 40 rules?&#x27;, answers:[&#x27;Yes&#x27;,&#x27;No, training can run out of pairs&#x27;], correct:1},
    {name:&#x27;Encoding&#x27;, rule:&#x27;Replay learned merge rules in training order.&#x27;, flow:[&#x27;new text&#x27;,&#x27;base bytes&#x27;,&#x27;rule 1&#x27;,&#x27;rule 2&#x27;,&#x27;BPE IDs&#x27;], detail:&#x27;Encoding never counts frequencies or invents a rule for the current sentence.&#x27;, question:&#x27;Why did repeated emoji receive zero compression?&#x27;, answers:[&#x27;No learned emoji-byte rule matched&#x27;,&#x27;UTF-8 cannot encode emoji&#x27;], correct:0},
    {name:&#x27;Decoding&#x27;, rule:&#x27;Expand learned IDs in reverse rule order.&#x27;, flow:[&#x27;BPE IDs&#x27;,&#x27;reverse rules&#x27;,&#x27;base bytes&#x27;,&#x27;UTF-8&#x27;,&#x27;text&#x27;], detail:&#x27;Reverse order resolves nested IDs. Unknown IDs fail before partial decoding; round trip must recover exact text.&#x27;, question:&#x27;Why expand the newest rule first?&#x27;, answers:[&#x27;It may contain earlier learned IDs&#x27;,&#x27;It makes bytes smaller&#x27;], correct:0},
    {name:&#x27;Coverage versus compression&#x27;, rule:&#x27;Base bytes guarantee coverage; learned rules improve compression.&#x27;, flow:[&#x27;unseen text&#x27;,&#x27;known bytes&#x27;,&#x27;valid tokens&#x27;,&#x27;maybe many pieces&#x27;], detail:&#x27;Training-domain text often compresses better. Evaluation text remains representable even when no learned rule matches.&#x27;, question:&#x27;Does more vocabulary guarantee fewer tokens for every input?&#x27;, answers:[&#x27;Yes&#x27;,&#x27;No&#x27;], correct:1},
    {name:&#x27;Measured cost tradeoff&#x27;, rule:&#x27;More useful rules cost passes but can shorten familiar text.&#x27;, flow:[&#x27;0 rules: 1499&#x27;,&#x27;5: 401&#x27;,&#x27;10: 203&#x27;,&#x27;20: 104&#x27;,&#x27;28: 104&#x27;], detail:&#x27;Naive training and encoding scan per rule. Vocabulary is 259 plus actual learned rules; compression can plateau.&#x27;, question:&#x27;Why did 20→28 rules leave evaluation at 104 tokens?&#x27;, answers:[&#x27;Later rules did not match evaluation text&#x27;,&#x27;The byte vocabulary disappeared&#x27;], correct:0}
  ];
  const name = root.querySelector(&#x27;#m1c-name&#x27;);
  const rule = root.querySelector(&#x27;#m1c-rule&#x27;);
  const flow = root.querySelector(&#x27;#m1c-flow&#x27;);
  const detail = root.querySelector(&#x27;#m1c-detail&#x27;);
  const question = root.querySelector(&#x27;#m1c-question&#x27;);
  const answers = root.querySelector(&#x27;#m1c-answers&#x27;);
  const feedback = root.querySelector(&#x27;#m1c-feedback&#x27;);
  function show(index) {
    const topic = topics[index];
    name.textContent = topic.name;
    rule.textContent = topic.rule;
    flow.replaceChildren(...topic.flow.map(value =&gt; {
      const node = document.createElement(&#x27;span&#x27;);
      node.textContent = value;
      return node;
    }));
    detail.textContent = topic.detail;
    question.textContent = topic.question;
    answers.replaceChildren(...topic.answers.map((answer, answerIndex) =&gt; {
      const button = document.createElement(&#x27;button&#x27;);
      button.className = &#x27;btn&#x27;;
      button.textContent = answer;
      button.addEventListener(&#x27;click&#x27;, () =&gt; {
        feedback.textContent = answerIndex === topic.correct ? &#x27;Correct.&#x27; : &#x27;Try again.&#x27;;
      });
      return button;
    }));
    feedback.textContent = &#x27;Choose an answer.&#x27;;
    root.querySelectorAll(&#x27;[data-topic]&#x27;).forEach((button, buttonIndex) =&gt; {
      button.setAttribute(&#x27;aria-pressed&#x27;, String(buttonIndex === index));
    });
  }
  root.querySelectorAll(&#x27;[data-topic]&#x27;).forEach(button =&gt; {
    button.addEventListener(&#x27;click&#x27;, () =&gt; show(Number(button.dataset.topic)));
  });
  show(0);
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
&lt;script id=&quot;codex-visualization-lucide&quot; async src=&quot;https://unpkg.com/lucide@1.17.0/dist/umd/lucide.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById(&quot;codex-visualization-lucide&quot;)
    ?.addEventListener(&quot;load&quot;, initialize, { once: true });
})();
&lt;/script&gt;
